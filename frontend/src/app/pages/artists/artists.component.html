<main class="container">
  <div class="artistlist">
    <ul>
      @for (artist of artists | async; track artist) {
        <li class="artistlist__li">
          <a
            class="artistlist__link"
            [routerLink]="['/cards/artist/' + encode(artist.artistName)]"
            >{{ artist.artistName }}</a
            >
          </li>
        }
      </ul>
    </div>
  </main>
