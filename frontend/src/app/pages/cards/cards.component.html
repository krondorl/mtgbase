<main class="container">
  <div class="cardlist">
    @for (card of cards | async; track card) {
      <div class="cardlist__card">
        <a class="cardlist__link" [routerLink]="['/card/' + card.id]">
          <img
            class="cardlist__img"
            src="/assets/single-cards/{{ card.imageName }}"
            />
          </a>
        </div>
      }
    </div>
  </main>
